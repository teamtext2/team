<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text2 Notes</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            resize: none;
            outline: none;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #000;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        .notes {
            margin-top: 15px;
        }

        .note {
            background: #fafafa;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .note p {
            flex: 1;
            margin-right: 10px;
        }

        .delete {
            background: red;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 5px 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="app">
        <h1>📝 Text2 Notes</h1>

        <textarea id="noteInput" placeholder="Nhập ghi chú..."></textarea>
        <button onclick="addNote()">Thêm ghi chú</button>

        <div class="notes" id="notesList"></div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem("notes")) || [];

        function renderNotes() {
            const list = document.getElementById("notesList");
            list.innerHTML = "";

            notes.forEach((note, index) => {
                list.innerHTML += `
          <div class="note">
            <p>${note}</p>
            <button class="delete" onclick="deleteNote(${index})">X</button>
          </div>
        `;
            });
        }

        function addNote() {
            const input = document.getElementById("noteInput");
            const value = input.value.trim();

            if (!value) return;

            notes.push(value);
            localStorage.setItem("notes", JSON.stringify(notes));

            input.value = "";
            renderNotes();
        }

        function deleteNote(index) {
            notes.splice(index, 1);
            localStorage.setItem("notes", JSON.stringify(notes));
            renderNotes();
        }

        renderNotes();
    </script>
</body>

</html>
