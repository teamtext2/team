<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/main.js" defer></script>
    <!-- Primary Meta Tags -->
    <title>Text2 Design</title>
    <meta name="title" content="Text2 Design - Minimalist & Smart Drawing App">
    <meta name="description"
        content="Experience Text2 Design, a minimalist, elegant, and modern web-based drawing application. Unleash your creativity with smart AI tools, save and manage your artworks easily.">
    <meta name="keywords"
        content="Text2 Design, Text-2, online drawing app, web paint, sketch online, AI drawing tools, minimalist canvas">
    <meta name="author" content="Text-2">
    <link rel="canonical" href="https://text2.co/app/paint/">

    <!-- Open Graph / Facebook / Zalo / Telegram -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://text2.co/app/paint/">
    <meta property="og:title" content="Text2 Paint - Minimalist & Smart Drawing App">
    <meta property="og:description"
        content="Experience Text2 Paint, a minimalist, elegant, and modern web-based drawing application. Unleash your creativity with smart AI tools.">
    <meta property="og:image" content="https://text2.co/app/paint/apple-touch-icon.png">
    <meta property="og:site_name" content="Text2">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://text2.co/app/paint/">
    <meta property="twitter:title" content="Text2 Paint - Minimalist & Smart Drawing App">
    <meta property="twitter:description"
        content="Experience Text2 Paint, a minimalist, elegant, and modern web-based drawing application. Unleash your creativity with smart AI tools.">
    <meta property="twitter:image" content="https://text2.co/app/paint/apple-touch-icon.png">

    <!-- Icons -->
    <link rel="icon" href="https://text2.co/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://text2.co/app/paint/apple-touch-icon.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="text-slate-800 h-[100dvh] w-screen overflow-hidden flex flex-col">

    <!-- Custom Cursor Preview -->
    <div id="brush-cursor"></div>

    <!-- ================= VIEW 1: TRANG CHỦ (QUẢN LÝ DỰ ÁN) ================= -->
    <div id="home-view"
        class="flex-1 overflow-y-auto no-scrollbar flex flex-col h-full w-full absolute top-0 left-0 bg-[#f8fafc] z-10 transition-all duration-300">
        <!-- Header Tách Biệt & Hiện Đại -->
        <header class="w-full bg-white/85 backdrop-blur-md border-b border-slate-200/80 sticky top-0 z-40 shadow-sm">
            <div class="max-w-7xl mx-auto px-5 md:px-10 py-4 flex justify-between items-center">

                <!-- Logo & Link -->
                <a href="https://text2.co/"
                    class="flex items-center gap-3.5 group text-decoration-none cursor-pointer">
                    <img src="https://text2.co/favicon.ico" alt="Text2 Logo"
                        class="w-10 h-10 rounded-xl shadow-sm border border-slate-100 group-hover:shadow-md transition-all group-hover:scale-105 bg-white object-cover">
                    <div class="flex flex-col">
                        <h1
                            class="text-xl md:text-2xl font-bold tracking-tight text-slate-900 group-hover:text-indigo-600 transition-colors leading-none">
                            Text2 Paint<span class="text-indigo-500">.</span></h1>
                        <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Creative Space
                        </p>
                    </div>
                </a>

                <!-- Nút bấm SVG cao cấp -->
                <button onclick="createNewProject()"
                    class="bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white px-5 md:px-6 py-2.5 rounded-full font-medium flex items-center gap-2 shadow-lg shadow-indigo-200/50 transition-all hover:shadow-xl hover:shadow-indigo-300/50 hover:-translate-y-0.5 active:scale-95 border border-white/10">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4">
                        </path>
                    </svg>
                    <span class="hidden sm:inline">New Project</span>
                </button>
            </div>
        </header>

        <!-- Lưới Nội Dung -->
        <main class="max-w-7xl mx-auto w-full flex-1 relative p-5 md:p-10 pb-[max(2rem,env(safe-area-inset-bottom))]">
            <div id="projects-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 md:gap-8 pb-10">
                <!-- Danh sách dự án sẽ được chèn vào đây -->
            </div>

            <!-- Trạng Thái Rỗng (Empty State) -->
            <div id="empty-state" class="hidden flex-col items-center justify-center min-h-[50vh] py-10 text-slate-400">
                <div
                    class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6 flex items-center justify-center">
                    <svg width="72" height="72" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C13.1 22 14 21.1 14 20C14 19.54 13.82 19.12 13.54 18.8C13.24 18.47 13.2 18.17 13.2 18C13.2 17.45 13.65 17 14.2 17H15.8C19.23 17 22 14.23 22 10.8C22 5.94 17.52 2 12 2ZM6.5 11.5C5.67 11.5 5 10.83 5 10C5 9.17 5.67 8.5 6.5 8.5C7.33 8.5 8 9.17 8 10C8 10.83 7.33 11.5 6.5 11.5ZM9.5 7.5C8.67 7.5 8 6.83 8 6C8 5.17 8.67 4.5 9.5 4.5C10.33 4.5 11 5.17 11 6C11 6.83 10.33 7.5 9.5 7.5ZM14.5 7.5C13.67 7.5 13 6.83 13 6C13 5.17 13.67 4.5 14.5 4.5C15.33 4.5 16 5.17 16 6C16 6.83 15.33 7.5 14.5 7.5ZM17.5 11.5C16.67 11.5 16 10.83 16 10C16 9.17 16.67 8.5 17.5 8.5C18.33 8.5 19 9.17 19 10C19 10.83 18.33 11.5 17.5 11.5Z"
                            fill="#818CF8" opacity="0.15" />
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C13.1 22 14 21.1 14 20C14 19.54 13.82 19.12 13.54 18.8C13.24 18.47 13.2 18.17 13.2 18C13.2 17.45 13.65 17 14.2 17H15.8C19.23 17 22 14.23 22 10.8C22 5.94 17.52 2 12 2ZM6.5 11.5C5.67 11.5 5 10.83 5 10C5 9.17 5.67 8.5 6.5 8.5C7.33 8.5 8 9.17 8 10C8 10.83 7.33 11.5 6.5 11.5ZM9.5 7.5C8.67 7.5 8 6.83 8 6C8 5.17 8.67 4.5 9.5 4.5C10.33 4.5 11 5.17 11 6C11 6.83 10.33 7.5 9.5 7.5ZM14.5 7.5C13.67 7.5 13 6.83 13 6C13 5.17 13.67 4.5 14.5 4.5C15.33 4.5 16 5.17 16 6C16 6.83 15.33 7.5 14.5 7.5ZM17.5 11.5C16.67 11.5 16 10.83 16 10C16 9.17 16.67 8.5 17.5 8.5C18.33 8.5 19 9.17 19 10C19 10.83 18.33 11.5 17.5 11.5Z"
                            stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <p class="font-bold text-slate-700 text-xl">No artworks yet</p>
                <p class="text-sm mt-2 text-slate-500 max-w-sm text-center">Click <b>"New Project"</b> in the top right
                    corner to start your creative journey!</p>
            </div>
        </main>
    </div>

    <!-- ================= VIEW 2: KHÔNG GIAN VẼ ================= -->
    <div id="canvas-view" class="hidden flex-1 flex flex-col h-full w-full absolute top-0 left-0 bg-slate-100/50 z-20">

        <!-- Top Bar (Nổi) -->
        <div
            class="absolute top-[max(1rem,env(safe-area-inset-top))] left-4 right-4 flex justify-between items-center z-30 pointer-events-none">
            <button onclick="goHome()"
                class="pointer-events-auto glass text-slate-700 p-3 rounded-full shadow-sm hover:shadow hover:bg-white transition-all active:scale-95"
                title="Back to Home">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>

            <div class="flex gap-1.5 pointer-events-auto glass rounded-full shadow-sm p-1.5 border border-slate-200/60">
                <button onclick="undo()" id="btn-undo"
                    class="p-2 rounded-full text-slate-400 hover:bg-slate-100 transition-colors disabled:opacity-50"
                    title="Undo (Ctrl+Z)">
                    <i data-lucide="undo" class="w-5 h-5"></i>
                </button>
                <button onclick="redo()" id="btn-redo"
                    class="p-2 rounded-full text-slate-400 hover:bg-slate-100 transition-colors disabled:opacity-50"
                    title="Redo (Ctrl+Y)">
                    <i data-lucide="redo" class="w-5 h-5"></i>
                </button>
                <div class="w-px h-6 bg-slate-200 my-auto mx-1"></div>
                <button onclick="clearCanvas()"
                    class="p-2 rounded-full text-slate-600 hover:bg-red-50 hover:text-red-500 transition-colors"
                    title="Clear All">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
                <button onclick="downloadImage()"
                    class="p-2 rounded-full text-slate-600 hover:bg-blue-50 hover:text-blue-600 transition-colors"
                    title="Download Image">
                    <i data-lucide="download" class="w-5 h-5"></i>
                </button>
                <button onclick="saveProject()"
                    class="p-2 rounded-full text-indigo-600 bg-indigo-50 hover:bg-indigo-100 transition-colors flex items-center gap-1 ml-1"
                    title="Save Project">
                    <i data-lucide="save" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Canvas Container -->
        <div
            class="flex-1 w-full h-full p-0 md:p-6 md:pt-[5.5rem] pb-[8.5rem] md:pb-6 flex items-center justify-center relative">
            <div class="w-full h-full relative md:rounded-3xl overflow-auto shadow-none md:shadow-lg border-0 md:border border-slate-200/60 bg-white"
                id="canvas-wrapper">

                <!-- Trục đối xứng ảo (chỉ hiện khi chọn công cụ Đối xứng AI) -->
                <div id="symmetry-guide"
                    class="hidden absolute top-0 bottom-0 left-1/2 w-px border-l-2 border-dashed border-indigo-400/60 pointer-events-none z-10 shadow-[0_0_10px_rgba(99,102,241,0.3)]">
                </div>

                <canvas id="drawing-canvas" class="w-full h-full block"></canvas>
            </div>
        </div>

        <!-- Bottom Toolbar (Thiết kế Dock Premium + Scrollbar) -->
        <div
            class="absolute bottom-[max(1.5rem,env(safe-area-inset-bottom))] left-1/2 -translate-x-1/2 z-30 bg-white/80 backdrop-blur-2xl shadow-[0_12px_40px_-10px_rgba(0,0,0,0.15)] rounded-[28px] px-3 md:px-4 pt-3 pb-4 flex items-center gap-2.5 md:gap-4 transition-all w-[96vw] md:w-max max-w-[800px] overflow-x-auto custom-scrollbar border border-white">

            <!-- Công cụ chính -->
            <div
                class="flex items-center gap-1.5 bg-slate-100/70 p-1.5 rounded-2xl border border-slate-200/50 shrink-0">
                <button class="tool-btn active p-3 rounded-xl" data-tool="brush" title="Brush">
                    <i data-lucide="pen-tool" class="w-5 h-5"></i>
                </button>
                <button class="tool-btn p-3 rounded-xl text-slate-600 hover:bg-slate-200/60" data-tool="eraser"
                    title="Eraser">
                    <i data-lucide="eraser" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="w-px h-10 bg-slate-200/80 shrink-0 mx-0.5"></div>

            <!-- NHÓM CÔNG CỤ AI ĐỘT PHÁ -->
            <div
                class="flex items-center gap-1.5 bg-indigo-50/70 p-1.5 rounded-2xl border border-indigo-100/80 relative group shrink-0">
                <span
                    class="absolute -top-3.5 left-1/2 -translate-x-1/2 text-[9px] font-bold text-indigo-500 tracking-widest bg-white px-2.5 py-0.5 rounded-full border border-indigo-100 shadow-sm pointer-events-none whitespace-nowrap">AI
                    TOOLS</span>

                <!-- Vẽ tường thẳng AI -->
                <button class="tool-btn ai-tool-btn p-3 rounded-xl text-indigo-600 hover:bg-indigo-100/60"
                    data-tool="line-ai" title="AI Wall (Auto-snap 90°)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 20L20 4"
                            stroke-dasharray="2 2"></path>
                        <circle cx="4" cy="20" r="2" fill="currentColor" stroke="none"></circle>
                        <circle cx="20" cy="4" r="2" fill="currentColor" stroke="none"></circle>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M16 21v-2m0 0v-2m0 2h-2m2 0h2M4 9V7m0 0V5m0 2H2m2 0h2" stroke="#6366f1"></path>
                    </svg>
                </button>

                <!-- Vẽ đối xứng AI -->
                <button class="tool-btn ai-tool-btn p-3 rounded-xl text-indigo-600 hover:bg-indigo-100/60"
                    data-tool="symmetry" title="AI Symmetry (Mirror)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 3v18M17 8l4 4-4 4M7 8l-4 4 4 4" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 12h9M3 12h9"
                            opacity="0.4" />
                    </svg>
                </button>
            </div>

            <div class="w-px h-10 bg-slate-200/80 shrink-0 mx-0.5"></div>

            <!-- Bảng màu -->
            <div class="flex items-center gap-3 shrink-0 bg-slate-100/70 p-2.5 rounded-2xl border border-slate-200/50">
                <div id="color-palette" class="flex gap-2.5 items-center">
                    <button class="color-btn active w-6 h-6 rounded-full bg-[#0f172a] shadow-sm hover:scale-110"
                        data-color="#0f172a"></button>
                    <button class="color-btn w-6 h-6 rounded-full bg-[#ef4444] shadow-sm hover:scale-110"
                        data-color="#ef4444"></button>
                    <button class="color-btn w-6 h-6 rounded-full bg-[#3b82f6] shadow-sm hover:scale-110"
                        data-color="#3b82f6"></button>
                    <button class="color-btn w-6 h-6 rounded-full bg-[#10b981] shadow-sm hover:scale-110"
                        data-color="#10b981"></button>
                    <button class="color-btn w-6 h-6 rounded-full bg-[#f59e0b] shadow-sm hover:scale-110"
                        data-color="#f59e0b"></button>

                    <!-- Custom Color Picker -->
                    <div
                        class="color-btn custom-color-wrapper w-6 h-6 rounded-full shadow-sm bg-gradient-to-tr from-purple-500 via-pink-500 to-yellow-500 flex items-center justify-center border border-white hover:scale-110 transition-transform">
                        <input type="color" id="custom-color-input" value="#a855f7" title="Custom Color">
                    </div>
                </div>
            </div>

            <div class="w-px h-10 bg-slate-200/80 shrink-0 mx-0.5"></div>

            <!-- Kích thước cọ -->
            <div
                class="flex items-center gap-3 bg-slate-100/70 px-4 py-3 rounded-2xl border border-slate-200/50 shrink-0 min-w-[150px]">
                <i data-lucide="circle" class="w-3.5 h-3.5 text-slate-400 shrink-0"></i>
                <input type="range" id="brush-size" min="1" max="50" value="5" class="w-full">
                <i data-lucide="circle" class="w-5 h-5 text-slate-500 shrink-0"></i>
            </div>

        </div>
    </div>
</body>

</html>
