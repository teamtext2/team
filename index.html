<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Text-2 | Apps Gateway</title>
    <meta name="description" content="Cổng truy cập các ứng dụng của Team Text-2. Truy cập nhanh vào Ghi chú và các công cụ khác.">
    <style>
        :root {
            --primary-bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-color: #ffffff;
            --glow-color: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(50, 50, 50, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(30, 30, 30, 0.5) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 50px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 600px) {
            .links-grid {
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            }
        }

        .link-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px 20px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .link-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px var(--glow-color);
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 15px rgba(255, 255, 255, 0.2));
        }

        .link-name {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .url-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
            word-break: break-all;
        }

        .footer {
            margin-top: 60px;
            font-size: 0.9rem;
            color: var(--text-dim);
            opacity: 0.5;
        }

        /* Ambient light animation */
        .blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            filter: blur(100px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }
    </style>
</head>
<body>
    <div class="blobs">
        <div class="blob" style="top: 10%; left: 10%;"></div>
        <div class="blob" style="bottom: 10%; right: 10%; animation-delay: -5s;"></div>
    </div>

    <div class="container">
        <h1>Team Text-2</h1>
        <p class="subtitle">Truy cập bộ ứng dụng của chúng tôi</p>

        <div class="links-grid">
            <!-- Link 1 -->
            <a href="https://team.text-2.com/app/note" class="link-card" id="link-app-note">
                <div class="icon">📝</div>
                <div class="link-name">Ghi chú (App)</div>
                <div class="url-text">/app/note</div>
            </a>

            <!-- Link 2 -->
            <a href="https://team.text-2.com/app/note/" class="link-card" id="link-app-note-slash">
                <div class="icon">📁</div>
                <div class="link-name">Ghi chú (Folder)</div>
                <div class="url-text">/app/note/</div>
            </a>

            <!-- Link 3 -->
            <a href="https://team.text-2.com/note" class="link-card" id="link-note">
                <div class="icon">⚡</div>
                <div class="link-name">Truy cập nhanh</div>
                <div class="url-text">/note</div>
            </a>
        </div>

        <div class="footer">
            &copy; 2026 Team Text-2. Toàn bộ thiết kế được tối ưu hóa.
        </div>
    </div>
</body>
</html>
